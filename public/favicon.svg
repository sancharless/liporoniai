<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle dark -->
  <circle cx="32" cy="32" r="32" fill="#0d1117"/>

  <!-- Outer ring orange -->
  <circle cx="32" cy="32" r="26" stroke="#ff9500" stroke-width="3" fill="none" opacity="0.9"/>

  <!-- Cross lines - horizontal -->
  <line x1="4" y1="32" x2="16" y2="32" stroke="#ff9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="60" y2="32" stroke="#ff9500" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cross lines - vertical -->
  <line x1="32" y1="4" x2="32" y2="16" stroke="#ff9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="60" stroke="#ff9500" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="12" stroke="#ff9500" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ff9500"/>

  <!-- Tick marks on outer ring at 45° angles (tactical feel) -->
  <line x1="13.5" y1="13.5" x2="17.8" y2="17.8" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="50.5" y1="13.5" x2="46.2" y2="17.8" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="13.5" y1="50.5" x2="17.8" y2="46.2" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="50.5" y1="50.5" x2="46.2" y2="46.2" stroke="#ff9500" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
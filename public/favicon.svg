<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background dark rounded square -->
  <rect width="32" height="32" rx="7" fill="#080b10"/>
  
  <!-- Orange glow backdrop -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,149,0,0.12)" stroke-width="6"/>

  <!-- Crosshair — outer ring -->
  <circle cx="16" cy="16" r="9" fill="none" stroke="#ff9500" stroke-width="1.6" opacity="0.9"/>

  <!-- Crosshair — inner ring -->
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="#ff9500" stroke-width="1.4" opacity="0.95"/>

  <!-- Crosshair — center dot -->
  <circle cx="16" cy="16" r="1.4" fill="#ff9500"/>

  <!-- Crosshair — top tick -->
  <line x1="16" y1="5" x2="16" y2="10.5" stroke="#ff9500" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Crosshair — bottom tick -->
  <line x1="16" y1="21.5" x2="16" y2="27" stroke="#ff9500" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Crosshair — left tick -->
  <line x1="5" y1="16" x2="10.5" y2="16" stroke="#ff9500" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Crosshair — right tick -->
  <line x1="21.5" y1="16" x2="27" y2="16" stroke="#ff9500" stroke-width="1.6" stroke-linecap="round"/>
</svg>